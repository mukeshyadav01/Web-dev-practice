<!DOCTYPE html> 
<html> 
<head> 
<title>Looping Statements Demo</title> 
</head> 
<body> 
<h2>JavaScript Looping Statements</h2> 
<h3>1. FOR Loop (Print Numbers)</h3> 
<input type="number" id="n1"> 
<button onclick="runFor()">Run FOR Loop</button> 
<p id="r1"></p> 
<h3>2. WHILE Loop (Sum of Numbers)</h3> 
<input type="number" id="n2"> 
<button onclick="runWhile()">Run WHILE Loop</button> 
<p id="r2"></p> 
<h3>3. DO...WHILE Loop</h3> 
<input type="number" id="n3"> 
<button onclick="runDo()">Run DO WHILE</button> 
<p id="r3"></p> 
<h3>4. FOR...OF Loop (Array Elements)</h3> 
<button onclick="runForOf()">Show Fruits</button> 
<p id="r4"></p> 
<h3>5. forEach() Loop (Array Squares)</h3> 
<button onclick="runForEach()">Show Squares</button> 
<p id="r5"></p> 
<script> 
function runFor(){ 
let n=n1.value,t=""; 
for(let i=1;i<=n;i++) t+=i+" "; 
r1.innerHTML=t; 
} 
function runWhile(){ 
let n=n2.value,i=1,sum=0; 
while(i<=n) 
{ sum+=i;  
    i++; } 
r2.innerHTML="Sum = "+sum; 
} 
function runDo(){ 
let n=n3.value,i=1,t=""; 
do{ t+=i+" "; 
 i++; }while(i<=n); 
r3.innerHTML=t; 
} 
function runForOf(){ 
let arr=["Apple","Banana","Mango","Orange"],t=""; 
for(let x of arr) t+=x+" "; 
r4.innerHTML=t; 
} 
function runForEach(){ 
let arr = [1,2,3,4,5]; 
let t = ""; 
for(let i=0; i<arr.length; i++){ 
    t = t + arr[i]*arr[i] + " "; 
} 
r5.innerHTML = t; 
} 
</script> 
</body> 
</html>
