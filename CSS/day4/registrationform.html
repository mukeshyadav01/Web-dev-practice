<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>University Registration form</h1>
    <p>Please fill out the form below to register.</p>
    <hr>
    <form action="">
        <h2>Personal detail</h2>
        <label for="fname">First Name:</label>
        <input type="text" name="userfname" id="fname"placeholder="e.g your name" required >
        <br>
        <br>
        <label for="lname">Last Name:</label>
        <input type="text" name="user lname" id="lname" placeholder="e.g surname">
        <br><br>
        <label for="dob">Date of birth:</label>
        <input type="date" name="dob" id="dob">
        <br><br>
        <h3>Gender</h3>
        <label for="male">Male:</label>
        <input type="radio" name="gender" id="male" value="male">
        <br><br>
        <label for="female">Female:</label>
        <input type="radio" name="gender" id="female" value="female">
        <br><br>
       <label for="file">Upload your photo :</label>
        <input type="file" name="file" id="file">
        <hr>
        <h2>Contact details</h2>
        <label for="email">Email:</label>
        <input type="email" name="email_id" id="email" >
        <br><br>
        <label for="phone">Phone no:</label>
        <input type="tel" name="Phone" id="phone" >
        <br><br>
        <label for="add">Mailing Address:</label><br>
        <textarea name="address" id="add" rows="8" cols="50"></textarea>
        <hr>
        <h2>Academic Informaton</h2>
        <label for="course">Select your Course:</label><br>
        <select name="course" id="course">
            <option value="ce">CE</option>
            <option value="me">ME</option>
            <option value="elec">ELEC</option>
        </select>
        <h3>Extracuricular Activities</h3>
        <label for="sports">Sports</label>
        <input type="checkbox" name="intrest" id="sports" value="sports">
        <br><br>
        <label for="music">Music</label>
        <input type="checkbox" name="intrest" id="music" value="music">
        <br><br>
        <label for="tech">Technology</label>
        <input type="checkbox" name="intrest" id="tech" value="Technology">
        <br><br>
        <hr>
        <h2>Create Your Account</h2>
        <label for="username">Create Username :</label>
        <input type="text" name="username" id="username" placeholder="@mukesh_yadav"><br><br>
        <label for="pass">Create Password:</label>
        <input type="password" name="password" id="pass">
        <br><br>
        <label for="secq">Security Question:</label>
        <select name="secq" id="secq">
            <option value="pet name">what was your pet name</option>
            <option value="nick name">what is your nick name</option>
        </select>
        <br><br>
        <label for="secu">Security Answer:</label>
        <input type="text" name="secu" id="secu">
        <br><br>
        <input type="checkbox" name="T&C" id="t&c">
        <label for="t&c">I agree the Term and Condition</label>
        <hr>
        <button type="submit">Register</button>
        <button type="reset">Clear form</button>
    </form>
</body>
</html>
